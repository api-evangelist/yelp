aid: yelp
name: Yelp
description: >-
  Yelp connects people with great local businesses. The Yelp Fusion API gives
  developers programmatic access to Yelp's database of millions of local
  businesses, ratings, reviews, photos, events, and category taxonomy, plus the
  Yelp Fusion AI conversational search endpoint. Core public capabilities include
  business search and discovery, business details, review excerpts, autocomplete,
  phone and address matching, and local event search. Partner-tier APIs add
  reviews response, leads, advertising, reservations, waitlist, checkout, and
  reporting. Authentication uses a Yelp API key passed as a bearer token.
