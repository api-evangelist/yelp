                  value:
                    total: 240
                    businesses:
                    - id: gR9DTbKCON2g1Z23bWcEpQ
                      alias: rickys-tacos-san-francisco
                      name: Ricky's Tacos
                      image_url: https://s3-media0.fl.yelpcdn.com/bphoto/abc123/o.jpg
                      is_closed: false
                      url: https://www.yelp.com/biz/rickys-tacos-san-francisco
                      review_count: 1289
                      categories:
                      - {}
