naftiko: 1.0.0-alpha2
info:
  label: "Yelp Fusion API \u2014 Category Taxonomy"
  description: "Category Taxonomy \u2014 Categories. 2 operation(s). Lead operation: Get All Categories. Self-contained Naftiko capability covering one Yelp business surface."
  tags:
  - Yelp
  - Restaurant
  - Categories
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    YELP_API_KEY: YELP_API_KEY
capability:
  consumes:
  - type: http
    namespace: yelp-categories
    baseUri: https://api.yelp.com
    description: "Yelp Fusion API \u2014 Categories business capability. Self-contained, no shared references."
    authentication:
      type: bearer
      token: '{{env.YELP_API_KEY}}'
    resources:
    - name: v3-categories
      path: /v3/categories
      operations:
      - name: getAllCategories
        method: GET
        description: Get All Categories
        inputParameters:
        - name: locale
          in: query
          type: string
          required: false
          description: Locale in the form {language}_{country}, e.g. en_US.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v3-categories-alias
      path: /v3/categories/{alias}
      operations:
      - name: getCategory
        method: GET
        description: Get Category Details
        inputParameters:
        - name: alias
          in: path
          type: string
          required: true
          description: The category alias, e.g. "restaurants".
        - name: locale
          in: query
          type: string
          required: false
          description: Locale in the form {language}_{country}, e.g. en_US.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: yelp-categories-rest
    port: 8080
    description: "REST adapter for Yelp Fusion API \u2014 Categories. One Spectral-compliant resource per consumed operation, prefixed with /v1."
    resources:
    - path: /v1/categories
      name: v3-categories
      description: REST surface for v3-categories.
      operations:
      - method: GET
        name: getAllCategories
        description: Get All Categories
        call: yelp-categories.getAllCategories
        with:
          locale: rest.locale
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/categories/{alias}
      name: v3-categories-alias
      description: REST surface for v3-categories-alias.
      operations:
      - method: GET
        name: getCategory
        description: Get Category Details
        call: yelp-categories.getCategory
        with:
          alias: rest.alias
          locale: rest.locale
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: yelp-categories-mcp
    port: 9090
    transport: http
    description: "MCP adapter for Yelp Fusion API \u2014 Categories. One tool per consumed operation, routed inline through this capability's consumes block."
    tools:
    - name: get-all-categories
      description: Get All Categories
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: yelp-categories.getAllCategories
      with:
        locale: tools.locale
      outputParameters:
      - type: object
        mapping: $.
    - name: get-category-details
      description: Get Category Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: yelp-categories.getCategory
      with:
        alias: tools.alias
        locale: tools.locale
      outputParameters:
      - type: object
        mapping: $.
