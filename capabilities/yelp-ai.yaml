naftiko: 1.0.0-alpha2
info:
  label: "Yelp Fusion API \u2014 Conversational AI"
  description: "Conversational AI \u2014 AI. 1 operation(s). Lead operation: Yelp AI Chat. Self-contained Naftiko capability covering one Yelp business surface."
  tags:
  - Yelp
  - Restaurant
  - AI
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    YELP_API_KEY: YELP_API_KEY
capability:
  consumes:
  - type: http
    namespace: yelp-ai
    baseUri: https://api.yelp.com
    description: "Yelp Fusion API \u2014 AI business capability. Self-contained, no shared references."
    authentication:
      type: bearer
      token: '{{env.YELP_API_KEY}}'
    resources:
    - name: ai-chat-v2
      path: /ai/chat/v2
      operations:
      - name: aiChat
        method: POST
        description: Yelp AI Chat
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: yelp-ai-rest
    port: 8080
    description: "REST adapter for Yelp Fusion API \u2014 AI. One Spectral-compliant resource per consumed operation, prefixed with /v1."
    resources:
    - path: /v1/chat/v2
      name: ai-chat-v2
      description: REST surface for ai-chat-v2.
      operations:
      - method: POST
        name: aiChat
        description: Yelp AI Chat
        call: yelp-ai.aiChat
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: yelp-ai-mcp
    port: 9090
    transport: http
    description: "MCP adapter for Yelp Fusion API \u2014 AI. One tool per consumed operation, routed inline through this capability's consumes block."
    tools:
    - name: yelp-ai-chat
      description: Yelp AI Chat
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: yelp-ai.aiChat
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
