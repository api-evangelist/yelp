naftiko: 1.0.0-alpha2
info:
  label: "Yelp Fusion API \u2014 Local Events"
  description: "Local Events \u2014 Events. 2 operation(s). Lead operation: Search Events. Self-contained Naftiko capability covering one Yelp business surface."
  tags:
  - Yelp
  - Restaurant
  - Events
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    YELP_API_KEY: YELP_API_KEY
capability:
  consumes:
  - type: http
    namespace: yelp-events
    baseUri: https://api.yelp.com
    description: "Yelp Fusion API \u2014 Events business capability. Self-contained, no shared references."
    authentication:
      type: bearer
      token: '{{env.YELP_API_KEY}}'
    resources:
    - name: v3-events
      path: /v3/events
      operations:
      - name: searchEvents
        method: GET
        description: Search Events
        inputParameters:
        - name: locale
          in: query
          type: string
          required: false
          description: Locale in the form {language}_{country}, e.g. en_US.
        - name: offset
          in: query
          type: integer
          required: false
          description: Offset into the list of returned events.
        - name: limit
          in: query
          type: integer
          required: false
          description: Number of events to return.
        - name: sort_by
          in: query
          type: string
          required: false
          description: Sort direction.
        - name: sort_on
          in: query
          type: string
          required: false
          description: Field to sort events on.
        - name: start_date
          in: query
          type: integer
          required: false
          description: Unix timestamp lower bound for event start time.
        - name: end_date
          in: query
          type: integer
          required: false
          description: Unix timestamp upper bound for event start time.
        - name: categories
          in: query
          type: string
          required: false
          description: Comma-delimited list of event category aliases.
        - name: is_free
          in: query
          type: boolean
          required: false
          description: Filter for free events.
        - name: location
          in: query
          type: string
          required: false
          description: Geographic area to search for events.
        - name: latitude
          in: query
          type: number
          required: false
          description: Latitude of the search center.
        - name: longitude
          in: query
          type: number
          required: false
          description: Longitude of the search center.
        - name: radius
          in: query
          type: integer
          required: false
          description: Search radius in meters. Maximum 40000.
        - name: excluded_events
          in: query
          type: string
          required: false
          description: Comma-delimited list of event ids to exclude.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v3-events-event-id
      path: /v3/events/{event_id}
      operations:
      - name: getEvent
        method: GET
        description: Get Event Details
        inputParameters:
        - name: event_id
          in: path
          type: string
          required: true
          description: The id of the event to retrieve.
        - name: locale
          in: query
          type: string
          required: false
          description: Locale in the form {language}_{country}, e.g. en_US.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: yelp-events-rest
    port: 8080
    description: "REST adapter for Yelp Fusion API \u2014 Events. One Spectral-compliant resource per consumed operation, prefixed with /v1."
    resources:
    - path: /v1/events
      name: v3-events
      description: REST surface for v3-events.
      operations:
      - method: GET
        name: searchEvents
        description: Search Events
        call: yelp-events.searchEvents
        with:
          locale: rest.locale
          offset: rest.offset
          limit: rest.limit
          sort_by: rest.sort_by
          sort_on: rest.sort_on
          start_date: rest.start_date
          end_date: rest.end_date
          categories: rest.categories
          is_free: rest.is_free
          location: rest.location
          latitude: rest.latitude
          longitude: rest.longitude
          radius: rest.radius
          excluded_events: rest.excluded_events
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/events/{event_id}
      name: v3-events-event-id
      description: REST surface for v3-events-event-id.
      operations:
      - method: GET
        name: getEvent
        description: Get Event Details
        call: yelp-events.getEvent
        with:
          event_id: rest.event_id
          locale: rest.locale
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: yelp-events-mcp
    port: 9090
    transport: http
    description: "MCP adapter for Yelp Fusion API \u2014 Events. One tool per consumed operation, routed inline through this capability's consumes block."
    tools:
    - name: search-events
      description: Search Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: yelp-events.searchEvents
      with:
        locale: tools.locale
        offset: tools.offset
        limit: tools.limit
        sort_by: tools.sort_by
        sort_on: tools.sort_on
        start_date: tools.start_date
        end_date: tools.end_date
        categories: tools.categories
        is_free: tools.is_free
        location: tools.location
        latitude: tools.latitude
        longitude: tools.longitude
        radius: tools.radius
        excluded_events: tools.excluded_events
      outputParameters:
      - type: object
        mapping: $.
    - name: get-event-details
      description: Get Event Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: yelp-events.getEvent
      with:
        event_id: tools.event_id
        locale: tools.locale
      outputParameters:
      - type: object
        mapping: $.
