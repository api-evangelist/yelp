naftiko: 1.0.0-alpha2
info:
  label: Yelp Fusion API — Events
  description: 'Yelp Fusion API — Events. 3 operations. Lead operation: Event Search. Self-contained Naftiko capability covering
    one Yelp business surface.'
  tags:
  - Yelp
  - Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    YELP_API_KEY: YELP_API_KEY
capability:
  consumes:
  - type: http
    namespace: yelp-events
    baseUri: https://api.yelp.com
    description: Yelp Fusion API — Events business capability. Self-contained, no shared references.
    resources:
    - name: v3-events
      path: /v3/events
      operations:
      - name: get
        method: GET
        description: Event Search
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v3-events-id
      path: /v3/events/{id}
      operations:
      - name: get
        method: GET
        description: Event Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    - name: v3-featured_event
      path: /v3/featured_event
      operations:
      - name: get
        method: GET
        description: Featured Event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.YELP_API_KEY}}'
  exposes:
  - type: rest
    namespace: yelp-events-rest
    port: 8080
    description: REST adapter for Yelp Fusion API — Events. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v3/events
      name: v3-events
      description: REST surface for v3-events.
      operations:
      - method: GET
        name: get
        description: Event Search
        call: yelp-events.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v3/events/{id}
      name: v3-events-id
      description: REST surface for v3-events-id.
      operations:
      - method: GET
        name: get
        description: Event Details
        call: yelp-events.get
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v3/featured-event
      name: v3-featured-event
      description: REST surface for v3-featured_event.
      operations:
      - method: GET
        name: get
        description: Featured Event
        call: yelp-events.get
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: yelp-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for Yelp Fusion API — Events. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: event-search
      description: Event Search
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: yelp-events.get
      outputParameters:
      - type: object
        mapping: $.
    - name: event-details
      description: Event Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: yelp-events.get
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: featured-event
      description: Featured Event
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: yelp-events.get
      outputParameters:
      - type: object
        mapping: $.
